[program:postfix]
command=bash -xc "postfix check && exec /usr/sbin/postfix start-fg %(ENV_POSTFIX_OPTIONS)s"
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
stopasgroup=true
